version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: telecom_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: telecom_twin_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - telecom_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d telecom_twin_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
    container_name: telecom_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/telecom_twin_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - telecom_network
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: telecom_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - telecom_network
    volumes:
      - ./frontend:/app
      - /app/node_modules

networks:
  telecom_network:
    driver: bridge

volumes:
  postgres_data: